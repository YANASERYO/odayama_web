        <script>

        <script>
        document.addEventListener("DOMContentLoaded", () => {
        const targets = document.querySelectorAll(".catchcopy");

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("is-show");
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.2
            });

            targets.forEach(target => observer.observe(target));
        });
        </script>


        <script>
        document.addEventListener("DOMContentLoaded", () => {
            const qr = document.querySelector(".insta_qr");
            const newsSection = document.querySelector("#news");

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting){
                        qr.classList.add("show");
                    } else {
                        qr.classList.remove("show");
                    }
                });
            }, {
                threshold: 0.1 
            });

            observer.observe(newsSection);
        });
        </script>


        <script>
        document.addEventListener("DOMContentLoaded", () => {
            const targets = document.querySelectorAll(".fade-up");

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("is-show");
                    observer.unobserve(entry.target);
                }
                });
            }, {
                threshold: 0.2
            });

            targets.forEach(target => observer.observe(target));
        });
        </script>

       <script>
            document.addEventListener("DOMContentLoaded", () => {

            /*毎年ここだけ変更*/
            const CURRENT_YEAR = 2026;
            const ERA_NAME = "令和";
            const ERA_START = 2019;

            const yakudoshi = {
                male: [
                { age: 24, label: "前厄" },
                { age: 25, label: "本厄", main: true },
                { age: 26, label: "後厄" },
                { age: 41, label: "前厄" },
                { age: 42, label: "本厄", main: true },
                { age: 43, label: "後厄" },
                { age: 60, label: "前厄" },
                { age: 61, label: "本厄", main: true },
                { age: 62, label: "後厄" }
                ],
                female: [
                { age: 18, label: "前厄" },
                { age: 19, label: "本厄", main: true },
                { age: 20, label: "後厄" },
                { age: 32, label: "前厄" },
                { age: 33, label: "本厄", main: true },
                { age: 34, label: "後厄" },
                { age: 36, label: "前厄" },
                { age: 37, label: "本厄", main: true },
                { age: 38, label: "後厄" }
                ]
            };

            function eraYear(year) {
                return year >= ERA_START
                ? `${ERA_NAME}${year - ERA_START + 1}`
                : year;
            }

            function renderGrouped(targetId, data) {
                const wrap = document.getElementById(targetId);
                if (!wrap) return;

                for (let i = 0; i < data.length; i += 3) {
                const group = data.slice(i, i + 3);

                const set = document.createElement("div");
                set.className = "yaku-set";

                const title = document.createElement("div");
                title.className = "yaku-set-title";
                title.textContent = `${group[0].age}〜${group[2].age}歳`;
                set.appendChild(title);

                group.forEach(item => {
                    const birthYear = CURRENT_YEAR - item.age + 1;
                    const row = document.createElement("div");
                    row.className = "yaku-row";
                    if (item.main) row.classList.add("honyaku");

                    row.innerHTML = `
                    <span>${item.age}歳 ${item.label}</span>
                    <span>${eraYear(birthYear)}年生</span>
                    `;
                    set.appendChild(row);
                });

                wrap.appendChild(set);
                }
            }

            document.getElementById("era-year").textContent = eraYear(CURRENT_YEAR);
            renderGrouped("yakudoshi-male", yakudoshi.male);
            renderGrouped("yakudoshi-female", yakudoshi.female);

            });
        </script>
